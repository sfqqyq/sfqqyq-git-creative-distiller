services:
  backend:
    build: ./backend
    env_file:
      - .env
    networks:
      - default
      - postgres_default
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./skills:/skills
      - /home:/home:ro

  frontend:
    build: ./frontend
    ports:
      - "8788:80"
    depends_on:
      - backend

networks:
  postgres_default:
    external: true
